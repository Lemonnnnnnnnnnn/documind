name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: macos-arm64
            runner: macos-latest
            artifact_name: documind-macos-arm64
            smoke_binary: ./release/documind-macos-arm64
          - target: windows-x64
            runner: windows-latest
            artifact_name: documind-windows-x64.exe
            smoke_binary: ./release/documind-windows-x64.exe

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: python -m pip install uv

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run test suite
        run: uv run pytest -q

      - name: Build binary
        run: uv run python scripts/build_binary.py --target ${{ matrix.target }} --clean

      - name: Smoke test binary
        run: ${{ matrix.smoke_binary }} convert example/sample.docx --out-dir ./tmp/smoke --overwrite

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: release/${{ matrix.artifact_name }}
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/documind-macos-arm64/documind-macos-arm64
            release-assets/documind-windows-x64.exe/documind-windows-x64.exe
